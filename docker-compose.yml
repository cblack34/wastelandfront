# Docker Compose for local testing of the Wasteland Front Docker image
# Usage:
#   docker compose up --build
#   Then visit http://localhost:8080

version: '3.8'

services:
  wastelandfront:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wastelandfront
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Optional: Add labels for Traefik / reverse proxies if needed later
    labels:
      - "traefik.enable=false"